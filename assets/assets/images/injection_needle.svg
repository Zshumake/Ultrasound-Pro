<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Syringe plunger -->
  <rect x="45" y="5" width="10" height="15" fill="#6B7280" />
  <!-- Syringe body -->
  <rect x="40" y="20" width="20" height="30" rx="2" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2"/>
  <!-- Syringe fluid (optional color) -->
  <rect x="42" y="30" width="16" height="18" fill="#34D399" opacity="0.6"/>
  <!-- Needle hub -->
  <path d="M45 50 L55 50 L52 55 L48 55 Z" fill="#EF4444" />
  <!-- Needle -->
  <line x1="50" y1="55" x2="50" y2="95" stroke="#9CA3AF" stroke-width="2" />
  <!-- Bevel tip -->
  <polygon points="49,95 51,95 50,98" fill="#9CA3AF" />
</svg>
