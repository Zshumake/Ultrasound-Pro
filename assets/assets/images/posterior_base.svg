<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2000">
  <defs>
    <style>
      .body-outline { fill: #e0e0e0; stroke: #333333; stroke-width: 4; stroke-dasharray: 10, 5; }
      .text-label { fill: #aaaaaa; font-family: sans-serif; font-size: 40px; text-anchor: middle; }
    </style>
  </defs>
  <!-- Head -->
  <circle cx="500" cy="200" r="120" class="body-outline" />
  <!-- Torso -->
  <rect x="300" y="320" width="400" height="600" rx="60" class="body-outline" />
  <!-- Left Arm -->
  <rect x="150" y="320" width="120" height="600" rx="40" class="body-outline" />
  <!-- Right Arm -->
  <rect x="730" y="320" width="120" height="600" rx="40" class="body-outline" />
  <!-- Left Leg -->
  <rect x="320" y="920" width="150" height="800" rx="50" class="body-outline" />
  <!-- Right Leg -->
  <rect x="530" y="920" width="150" height="800" rx="50" class="body-outline" />
  
  <text x="500" y="100" class="text-label">POSTERIOR VIEW (PLACEHOLDER)</text>
</svg>
