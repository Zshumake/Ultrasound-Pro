<meta charset="utf-8" />

<title>Guide to Ultrasound‑Guided Injections — Resident Teaching Manual (with Piriformis & SIJ)</title>
<style>
:root { --bg:#fff; --fg:#0b1220; --muted:#5a6270; --accent:#1f6feb; --card:#f8fafc; --border:#e5e7eb; }
@media (prefers-color-scheme: dark){ :root{ --bg:#0b1220; --fg:#e6edf3; --muted:#9aa4b2; --accent:#58a6ff; --card:#0f172a; --border:#1f2937; } }
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,rgba(0,0,0,.06),rgba(0,0,0,0));backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.container{max-width:1100px;margin:0 auto;padding:1rem}
.hstack{display:flex;gap:.75rem;align-items:center}
header h1{font-size:1.1rem;margin:0}
#search{flex:1;padding:.5rem .75rem;border:1px solid var(--border);border-radius:.5rem;background:var(--card);color:var(--fg)}
.btn{padding:.5rem .75rem;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:.5rem;cursor:pointer}
.btn:hover{border-color:var(--accent)}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:.75rem}
main{display:grid;grid-template-columns:260px 1fr;gap:1.25rem;padding:1rem}
#toc{position:sticky;top:3.5rem;height:calc(100vh - 4rem);overflow:auto;border-right:1px dashed var(--border);padding-right:1rem}
#toc h2{font-size:.9rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:0}
#toc a{display:block;color:var(--fg);text-decoration:none;padding:.35rem .25rem;border-radius:.35rem}
#toc a:hover{background:var(--card)}
.section{border:1px solid var(--border);border-radius:.75rem;background:var(--card);overflow:hidden}
.section .title{padding:1rem;border-bottom:1px solid var(--border);display:flex;gap:.75rem;flex-wrap:wrap;align-items:baseline}
.section .title h3{margin:0;font-size:1.1rem}
.section .body{padding:1rem;display:grid;gap:1rem}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.75rem 1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.75rem 1rem}
.block{border:1px solid var(--border);border-radius:.5rem;padding:.75rem .9rem;background:var(--bg)}
.block h4{margin:.2rem 0 .5rem;font-size:.95rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.block ul{margin:.25rem 0 .25rem 1.05rem}
.block li{margin:.15rem 0}
.callout{border-left:4px solid var(--accent)}
.placeholder{border:2px dashed var(--border);border-radius:.5rem;min-height:160px;padding:.5rem .75rem;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(128,128,128,.05) 10px,rgba(128,128,128,.05) 20px)}
.placeholder .label{font-size:.9rem}
@media print{header,#toc,#controls{display:none!important}main{display:block}.section{break-inside:avoid}}
</style>
</head>

</header>

function el(tag, attrs={}, ...children){ const e=document.createElement(tag); for(const[k,v] of Object.entries(attrs)){ if(k==='class') e.className=v; else if(k==='html') e.innerHTML=v; else e.setAttribute(k,v);} for(const c of children){ if(c==null) continue; if(typeof c==='string') e.appendChild(document.createTextNode(c)); else e.appendChild(c);} return e; }
function block(title, content){ const b=el('div',{class:'block'}); b.appendChild(el('h4',{},title)); b.appendChild(content); return b; }
function list(items){ const ul=el('ul'); (items||[]).forEach(x=>ul.appendChild(el('li',{},x))); return ul; }
function listNumbered(items){ const ol=el('ol'); (items||[]).forEach(x=>ol.appendChild(el('li',{},x))); return ol; }
function placeholder(label){ const d=el('div',{class:'placeholder'}); d.appendChild(el('div',{class:'label'}, `[IMAGE: ${label} — 4.5" × 2"]`)); return d; }

  const ph = el('div',{class:'grid-2'});

  const mid = el('div',{class:'grid-2'});

  mid.appendChild(block('Needle CORRIDOR (what you pass BETWEEN)', list(item.corridor)));
  const bot = el('div',{class:'grid-2'});
  bot.appendChild(block('Important structures to AVOID', list(item.avoid)));
  bot.appendChild(block('Step‑by‑step INJECTION', listNumbered(item.steps)));
  const tips = el('div',{class:'block'}); tips.appendChild(el('h4',{},'Helpful TIPS')); tips.appendChild(list(item.tips));
  body.append(top,lm,mid,bot,tips); section.append(title,body); return section;
}

const content=document.querySelector('#content'); const toc=document.querySelector('#toc-links');
data.forEach(item=>{ const sec=renderSection(item); content.appendChild(sec); toc.appendChild(el('a',{href:'#'+item.id}, item.title)); });

function setSections(open){ document.querySelectorAll('.section').forEach(s=>{ if(open){s.classList.add('open')} else {s.classList.remove('open')} }) }
const q=document.querySelector('#search'); q.addEventListener('input',()=>{ const term=q.value.toLowerCase(); document.querySelectorAll('.section').forEach(sec=>{ const hay=(sec.textContent+' '+(sec.dataset.tags||'')).toLowerCase(); sec.style.display = hay.includes(term)?'':''; }); });
document.querySelector('#expand').addEventListener('click',()=>setSections(true));
document.querySelector('#collapse').addEventListener('click',()=>setSections(false));
</script>
</body>
</html>
